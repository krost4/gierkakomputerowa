<!DOCTYPE html>
<html lang="pl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gierka komputerowa</title>


    <style>

        * {
            box-sizing: border-box;
        }


        html,
        body {
            margin: 0;
            min-height: 100%;
        }


        body {

            min-height: 100vh;

            display: flex;

            flex-direction: column;

            align-items: center;

            background: #eeeeee;

            color: #111111;

            font-family: Arial, sans-serif;

        }


        main {

            flex: 1;

            width: 100%;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            padding: 40px 20px;

        }


        h1 {

            font-size: 48px;

            margin-bottom: 35px;

        }


        .menu {

            display: flex;

            flex-direction: column;

            gap: 12px;

            width: 240px;

        }


        button {

            padding: 12px;

            font-size: 18px;

            cursor: pointer;

            background: white;

            color: black;

            border: 2px solid black;

        }


        button:hover {

            background: black;

            color: white;

        }


        footer {

            width: 100%;

            padding: 20px;

            text-align: center;

            border-top: 1px solid #aaaaaa;

        }


        footer a {

            color: black;

            font-size: 16px;

        }


    </style>

</head>


<body>


    <main>


        <h1>

            Gierka komputerowa

        </h1>


        <div class="menu">


            <button onclick="graj()">

                graj

            </button>


            <button onclick="trudne()">

                trudne

            </button>


            <button onclick="informacje()">

                informacje

            </button>


            <button onclick="kontakt()">

                kontakt

            </button>


            <button onclick="kodZrodlowy()">

                kod źródłowy (gitdom)

            </button>


        </div>


    </main>


    <footer>


        <a href="/termsofservice">

            ToS

        </a>


    </footer>


    <script>


        function graj() {

            window.location.href = "gra/";

        }


        function trudne() {

            window.location.href =
                "/trudne";

        }


        function informacje() {

            window.location.href =
                "/informacje";

        }


        function kontakt() {

            window.location.href =
                "/kontakt";

        }


        function kodZrodlowy() {

            window.location.href =
                "https://github.com/krost4/gierkakomputerowa";

        }


    </script>


</body>

</html>
