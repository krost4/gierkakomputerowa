<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<title>trudny tryb 😱😱💀</title>

<style>

* {
    box-sizing: border-box;
}

body {

    margin: 0;

    overflow: hidden;

    background: black;

    font-family: Arial, sans-serif;

}

#game {

    width: 100vw;

    height: 100vh;

    position: relative;

    overflow: hidden;

    background-image: url("bg.png");

    background-size: cover;

    background-position: center;

    animation: shake 0.12s infinite;

}


.player,
.enemy {

    position: absolute;

    width: 80px;

    height: 80px;

    object-fit: fill;

    user-select: none;

    pointer-events: none;

}


#timer {

    position: absolute;

    top: 10px;

    left: 10px;

    z-index: 10;

    color: white;

    background: black;

    border: 3px solid white;

    padding: 5px 10px;

    font-family: monospace;

    font-size: 24px;

}


@keyframes shake {

    0% {
        transform: translate(0, 0);
    }

    20% {
        transform: translate(2px, -2px);
    }

    40% {
        transform: translate(-2px, 1px);
    }

    60% {
        transform: translate(1px, 2px);
    }

    80% {
        transform: translate(-1px, -1px);
    }

    100% {
        transform: translate(0, 0);
    }

}


#gameOver {

    display: none;

    position: absolute;

    top: 0;

    left: 0;

    width: 100%;

    height: 100%;

    background: white;

    justify-content: center;

    align-items: center;

    flex-direction: column;

    color: black;

    font-family: "Times New Roman", serif;

    font-size: 48px;

    text-align: center;

}


#finalTime {

    font-size: 20px;

    margin-top: 10px;

}


#gameOver button {

    display: block;

    margin-top: 20px;

    padding: 5px 10px;

    font-family: "Times New Roman", serif;

    font-size: 16px;

    background: #eeeeee;

    color: black;

    border: 2px outset #aaaaaa;

    cursor: pointer;

}


#gameOver button:hover {

    background: #dddddd;

}

</style>

</head>


<body>


<div id="game">


    <div id="timer">

        CZAS: 0.0

    </div>


    <img
        id="player"
        class="player"
        src="sprite1.png"
    >


    <img
        id="enemy"
        class="enemy"
        src="sprite2.png"
    >


    <div id="gameOver">


        konec gry :(


        <div id="finalTime">

            przeżyłeś: 0.0 sekund

        </div>


        <button onclick="restartGame()">

            jeszcze raaz!!1!

        </button>


        <button onclick="goHome()">

            do domuu

        </button>


    </div>


</div>


<script>


const player =
    document.getElementById("player");


const enemy =
    document.getElementById("enemy");


const gameOver =
    document.getElementById("gameOver");


const timer =
    document.getElementById("timer");


const finalTime =
    document.getElementById("finalTime");



/*
    DŹWIĘK

    Plik:
    goodbye.mp3
*/


const goodbyeSound =
    new Audio("goodbye.mp3");



/*
    ROZMIAR

    Obrazki i hitboxy
    mają dokładnie taki sam
    rozmiar.
*/


const OBJECT_WIDTH = 80;

const OBJECT_HEIGHT = 80;



/*
    POZYCJE
*/


let playerX =
    window.innerWidth
    /
    2
    -
    OBJECT_WIDTH
    /
    2;


let playerY =
    window.innerHeight
    /
    2
    -
    OBJECT_HEIGHT
    /
    2;



let enemyX =
    Math.random()
    *
    (
        window.innerWidth
        -
        OBJECT_WIDTH
    );


let enemyY =
    Math.random()
    *
    (
        window.innerHeight
        -
        OBJECT_HEIGHT
    );



/*
    STAN GRY
*/


let gameRunning = true;



/*
    CZAS
*/


let startTime =
    Date.now();


let survivalTime = 0;



/*
    PRZECIWNIK

    MEGA SZYBKI XD
*/


const enemySpeed = 12;



/*
    MYSZKA

    KURSOR POZOSTAJE WIDOCZNY
*/


document.addEventListener(

    "mousemove",

    function(event) {


        playerX =

            event.clientX
            -
            OBJECT_WIDTH
            /
            2;



        playerY =

            event.clientY
            -
            OBJECT_HEIGHT
            /
            2;



        /*
            NIE WYCHODŹ POZA EKRAN
        */


        playerX = Math.max(

            0,

            Math.min(

                window.innerWidth
                -
                OBJECT_WIDTH,

                playerX

            )

        );


        playerY = Math.max(

            0,

            Math.min(

                window.innerHeight
                -
                OBJECT_HEIGHT,

                playerY

            )

        );

    }

);



/*
    KOLIZJA
*/


function checkCollision() {


    return (

        playerX
        <
        enemyX
        +
        OBJECT_WIDTH

        &&

        playerX
        +
        OBJECT_WIDTH
        >
        enemyX

        &&

        playerY
        <
        enemyY
        +
        OBJECT_HEIGHT

        &&

        playerY
        +
        OBJECT_HEIGHT
        >
        enemyY

    );

}



/*
    RUCH GRY
*/


function moveGame() {


    if (!gameRunning) {

        return;

    }



    /*
        CZAS
    */


    survivalTime =

        (

            Date.now()
            -
            startTime

        )
        /
        1000;



    timer.innerText =

        "CZAS: "
        +
        survivalTime.toFixed(1);



    /*
        POZYCJA GRACZA
    */


    player.style.left =

        playerX
        +
        "px";


    player.style.top =

        playerY
        +
        "px";



    /*
        PRZECIWNIK GONI MYSZKĘ
    */


    let dx =

        playerX
        -
        enemyX;


    let dy =

        playerY
        -
        enemyY;


    let distance =

        Math.sqrt(

            dx * dx
            +
            dy * dy

        );



    if (

        distance
        >
        0

    ) {


        enemyX +=

            (

                dx
                /
                distance

            )
            *
            enemySpeed;



        enemyY +=

            (

                dy
                /
                distance

            )
            *
            enemySpeed;

    }



    enemy.style.left =

        enemyX
        +
        "px";


    enemy.style.top =

        enemyY
        +
        "px";



    /*
        KOLIZJA
    */


    if (

        checkCollision()

    ) {

        endGame();

    }



    requestAnimationFrame(

        moveGame

    );

}



/*
    KONIEC GRY
*/


function endGame() {


    gameRunning = false;



    finalTime.innerText =

        "przeżyłeś: "
        +
        survivalTime.toFixed(1)
        +
        " sekund";



    gameOver.style.display =

        "flex";



    goodbyeSound.currentTime = 0;



    goodbyeSound.play()
        .catch(

            function(error) {

                console.log(

                    "Dźwięk zablokowany:",

                    error

                );

            }

        );

}



/*
    RESTART
*/


function restartGame() {


    playerX =

        window.innerWidth
        /
        2
        -
        OBJECT_WIDTH
        /
        2;


    playerY =

        window.innerHeight
        /
        2
        -
        OBJECT_HEIGHT
        /
        2;



    enemyX =

        Math.random()
        *
        (

            window.innerWidth
            -
            OBJECT_WIDTH

        );


    enemyY =

        Math.random()
        *
        (

            window.innerHeight
            -
            OBJECT_HEIGHT

        );



    startTime =

        Date.now();



    survivalTime = 0;



    player.style.left =

        playerX
        +
        "px";


    player.style.top =

        playerY
        +
        "px";


    enemy.style.left =

        enemyX
        +
        "px";


    enemy.style.top =

        enemyY
        +
        "px";



    timer.innerText =

        "CZAS: 0.0";



    gameOver.style.display =

        "none";



    goodbyeSound.pause();

    goodbyeSound.currentTime = 0;



    gameRunning = true;



    moveGame();

}



/*
    DO DOMU
*/


function goHome() {


    window.location.href =

        "../";

}



/*
    START
*/


moveGame();


</script>


</body>

</html>
